<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Wings - Mission Reviewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=Lora:wght@400;500&display=swap');

        :root {
            --cream: #faf6f1;
            --card-bg: #f5ede4;
            --accent: #b8860b;
            --accent-light: #daa520;
            --text-dark: #2c2416;
            --text-light: #6b5d4f;
            --border: #d4c4b0;
            --highlight: #ff6b6b;
            --highlight-light: #ffe5e5;
        }

        body {
            font-family: 'Lora', serif;
            background: linear-gradient(135deg, #2c2416 0%, #4a3f32 100%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .header-badge {
            display: inline-block;
            background: var(--accent);
            color: var(--cream);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            letter-spacing: 3px;
            font-weight: 500;
            margin-bottom: 1rem;
            text-transform: uppercase;
            border-radius: 2px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--cream);
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--accent-light);
            font-size: 1.1rem;
            font-style: italic;
        }

        .controls-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            animation: slideUp 0.6s ease-out 0.1s both;
        }

        .search-box, .filter-box {
            position: relative;
        }

        .search-box input, .filter-box input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text-dark);
            font-family: 'Lora', serif;
            font-size: 1rem;
            border-radius: 0;
            transition: all 0.3s ease;
        }

        .search-box input:focus, .filter-box input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--cream);
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.1);
        }

        .search-box label, .filter-box label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .card-container {
            perspective: 1000px;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .mission-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: cardFlip 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-image:
                linear-gradient(90deg, transparent 98%, rgba(184, 134, 11, 0.03) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(184, 134, 11, 0.01) 2px, rgba(184, 134, 11, 0.01) 4px);
        }

        @keyframes cardFlip {
            from {
                opacity: 0;
                transform: rotateY(10deg) translateZ(0);
            }
            to {
                opacity: 1;
                transform: rotateY(0) translateZ(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .mission-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-top: 0.5rem;
            color: var(--text-dark);
        }

        .card-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .meta-value {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        .meta-value.mono {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.95rem;
        }

        .description-section {
            margin-bottom: 2rem;
        }

        .section-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 0.8rem;
            font-weight: 500;
            display: block;
        }

        .description-text {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-dark);
            padding: 1rem;
            background: rgba(255, 255, 255, 0.3);
            border-left: 3px solid var(--accent);
        }

        .check-flag {
            background: var(--highlight-light);
            border: 2px solid var(--highlight);
            padding: 1rem;
            margin-top: 2rem;
            display: none;
        }

        .check-flag.active {
            display: block;
            animation: pulse 0.6s ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .check-flag-title {
            font-family: 'Playfair Display', serif;
            color: var(--highlight);
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .check-flag-title::before {
            content: "⚠";
            font-size: 1.5rem;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .field-value {
            font-size: 0.95rem;
            color: var(--text-dark);
            word-break: break-word;
            font-family: 'IBM Plex Mono', monospace;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.5rem;
        }

        .field-value.empty {
            color: var(--text-light);
            font-style: italic;
        }

        .navigation {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            animation: slideUp 0.6s ease-out 0.3s both;
            margin-bottom: 2rem;
        }

        .nav-button {
            background: var(--accent);
            border: none;
            color: var(--cream);
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .nav-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-button:hover:not(:disabled) {
            background: var(--accent-light);
            box-shadow: 0 4px 12px rgba(184, 134, 11, 0.4);
            transform: translateY(-2px);
        }

        .nav-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .progress-display {
            color: var(--cream);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 150px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-light);
            transition: width 0.3s ease;
            box-shadow: 0 0 8px var(--accent);
        }

        .status-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            padding: 0.35rem 0.7rem;
            background: var(--accent);
            color: var(--cream);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 0;
            font-weight: 500;
        }

        .badge.check {
            background: var(--highlight);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--cream);
            animation: fadeIn 0.6s ease-out;
        }

        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        #csvFileInput {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .controls-section {
                grid-template-columns: 1fr;
            }

            .fields-grid {
                grid-template-columns: 1fr;
            }

            .card-meta {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }

            .mission-card {
                padding: 1.5rem;
            }

            .navigation {
                flex-wrap: wrap;
            }

            .nav-button {
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-badge">Pacific Wings Archive</div>
            <h1>Mission Reviewer</h1>
            <p class="subtitle">Navigate through historical mission records for verification</p>
        </header>

        <div class="controls-section">
            <div class="search-box">
                <label for="searchInput">Search by ID or Target</label>
                <input type="text" id="searchInput" placeholder="e.g., HAWAIIANAF-19411207">
            </div>
            <div class="filter-box">
                <label for="filterInput">Filter by Squadron</label>
                <input type="text" id="filterInput" placeholder="e.g., FEAF, Hawaiian AF">
            </div>
        </div>

        <div class="card-container" id="cardContainer"></div>

        <div class="navigation">
            <button class="nav-button" id="prevBtn" onclick="previousMission()">← Previous</button>
            <div style="text-align: center;">
                <div class="progress-display">
                    <span id="currentIndex">1</span> / <span id="totalCount">1</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <button class="nav-button" id="nextBtn" onclick="nextMission()">Next →</button>
        </div>
    </div>

    <script>
        let allMissions = [];
        let filteredMissions = [];
        let currentIndex = 0;

        const cardContainer = document.getElementById('cardContainer');
        const searchInput = document.getElementById('searchInput');
        const filterInput = document.getElementById('filterInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentIndexSpan = document.getElementById('currentIndex');
        const totalCountSpan = document.getElementById('totalCount');
        const progressFill = document.getElementById('progressFill');

        // Load CSV data
        async function loadCSV() {
            try {
                const response = await fetch('./data/missions_chronology.csv');
                const text = await response.text();
                parseCSV(text);
                displayMission();
            } catch (error) {
                showFileUploadUI();
                console.error('CSV loading error:', error);
            }
        }

        function showFileUploadUI() {
            cardContainer.innerHTML = `
                <div class="empty-state">
                    <h2>⚠ Select CSV File</h2>
                    <p>Could not automatically load missions_chronology.csv</p>
                    <p style="font-size: 0.9rem; margin-top: 1.5rem;">
                        <input type="file" id="csvFileInput" accept=".csv" style="padding: 0.5rem; cursor: pointer;">
                    </p>
                    <p style="font-size: 0.85rem; color: var(--text-light); margin-top: 1rem;">Or locate it at: data/missions_chronology.csv</p>
                </div>
            `;

            const fileInput = document.getElementById('csvFileInput');
            if (fileInput) {
                fileInput.addEventListener('change', handleFileSelect);
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    parseCSV(e.target.result);
                    displayMission();
                } catch (error) {
                    cardContainer.innerHTML = `
                        <div class="empty-state">
                            <h2>⚠ Error Parsing CSV</h2>
                            <p>Could not parse the selected file</p>
                            <p style="font-size: 0.9rem; margin-top: 1rem;">${error.message}</p>
                        </div>
                    `;
                    console.error('Parse error:', error);
                }
            };
            reader.readAsText(file);
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');

            allMissions = lines.slice(1).map(line => {
                const values = parseCSVLine(line);
                const mission = {};
                headers.forEach((header, index) => {
                    mission[header] = values[index] || '';
                });
                return mission;
            });

            filteredMissions = [...allMissions];
            totalCountSpan.textContent = filteredMissions.length;
            updateProgressBar();
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];

                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);
            return result;
        }

        function displayMission() {
            if (filteredMissions.length === 0) {
                cardContainer.innerHTML = `
                    <div class="empty-state">
                        <h2>No Missions Found</h2>
                        <p>Try adjusting your search or filter criteria</p>
                    </div>
                `;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }

            const mission = filteredMissions[currentIndex];
            const toCheck = mission.to_check && mission.to_check.trim();

            let statusBadges = '';
            if (mission.type) {
                statusBadges += `<span class="badge">${escapeHtml(mission.type)}</span>`;
            }
            if (toCheck) {
                statusBadges += `<span class="badge check">Needs Review</span>`;
            }

            const hasEndLocation = mission.end_lat && mission.end_lng && mission.end_lat.trim() && mission.end_lng.trim();

            let html = `
                <div class="mission-card">
                    <div class="card-header">
                        <div>
                            <div class="mission-id">${escapeHtml(mission.id)}</div>
                            <div class="card-title">${escapeHtml(mission.target_name || mission.origin_base || 'Unknown Target')}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem;">Squadron</div>
                            <div style="font-size: 1.1rem; font-weight: 500;">${escapeHtml(mission.squadron)}</div>
                        </div>
                    </div>

                    ${statusBadges ? `<div class="status-badges">${statusBadges}</div>` : ''}

                    <div class="card-meta">
                        <div class="meta-item">
                            <span class="meta-label">Date</span>
                            <span class="meta-value mono">${formatDate(mission.start_time)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Origin Base</span>
                            <span class="meta-value">${escapeHtml(mission.origin_base || '—')}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Aircraft Type</span>
                            <span class="meta-value">${escapeHtml(mission.type || '—')}</span>
                        </div>
                    </div>

                    <div class="description-section">
                        <label class="section-label">Mission Description</label>
                        <div class="description-text">${escapeHtml(mission.description || 'No description available').replace(/\n/g, '<br>')}</div>
                    </div>

                    ${toCheck ? `
                        <div class="check-flag active">
                            <div class="check-flag-title">Flagged for Review</div>
                            <div style="color: var(--highlight); font-weight: 500;">${escapeHtml(toCheck)}</div>
                        </div>
                    ` : ''}

                    <div class="fields-grid">
                        <div class="field">
                            <span class="field-label">Start Position</span>
                            <span class="field-value ${!mission.start_lat ? 'empty' : ''}">${mission.start_lat && mission.start_lng ? `${mission.start_lat}, ${mission.start_lng}` : 'Not provided'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">End Position</span>
                            <span class="field-value ${!hasEndLocation ? 'empty' : ''}">${hasEndLocation ? `${mission.end_lat}, ${mission.end_lng}` : 'Not provided'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Duration (hours)</span>
                            <span class="field-value ${!mission.duration_hours ? 'empty' : ''}">${mission.duration_hours || '—'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Altitude (ft)</span>
                            <span class="field-value ${!mission.altitude ? 'empty' : ''}">${mission.altitude || '—'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Speed (mph)</span>
                            <span class="field-value ${!mission.speed ? 'empty' : ''}">${mission.speed || '—'}</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Aircraft Count</span>
                            <span class="field-value ${!mission.num_aircraft ? 'empty' : ''}">${mission.num_aircraft || '—'}</span>
                        </div>
                        <div class="field" style="grid-column: 1 / -1;">
                            <span class="field-label">Waypoints</span>
                            <span class="field-value ${!mission.waypoints ? 'empty' : ''}">${mission.waypoints || 'None recorded'}</span>
                        </div>
                    </div>
                </div>
            `;

            cardContainer.innerHTML = html;
            updateNavigation();
            updateProgressBar();
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateNavigation() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === filteredMissions.length - 1;
            currentIndexSpan.textContent = currentIndex + 1;
        }

        function updateProgressBar() {
            if (filteredMissions.length === 0) {
                progressFill.style.width = '0%';
            } else {
                const progress = ((currentIndex + 1) / filteredMissions.length) * 100;
                progressFill.style.width = progress + '%';
            }
        }

        function nextMission() {
            if (currentIndex < filteredMissions.length - 1) {
                currentIndex++;
                displayMission();
                scrollToTop();
            }
        }

        function previousMission() {
            if (currentIndex > 0) {
                currentIndex--;
                displayMission();
                scrollToTop();
            }
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterTerm = filterInput.value.toLowerCase();

            filteredMissions = allMissions.filter(mission => {
                const matchesSearch = !searchTerm ||
                    mission.id.toLowerCase().includes(searchTerm) ||
                    (mission.target_name && mission.target_name.toLowerCase().includes(searchTerm)) ||
                    (mission.origin_base && mission.origin_base.toLowerCase().includes(searchTerm));

                const matchesFilter = !filterTerm ||
                    mission.squadron.toLowerCase().includes(filterTerm);

                return matchesSearch && matchesFilter;
            });

            currentIndex = 0;
            totalCountSpan.textContent = filteredMissions.length;
            displayMission();
        }

        searchInput.addEventListener('input', applyFilters);
        filterInput.addEventListener('input', applyFilters);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousMission();
            if (e.key === 'ArrowRight') nextMission();
        });

        // Load on startup
        loadCSV();
    </script>
</body>
</html>
