<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Very slim fuselage (Ki-46 Dinah was extremely streamlined) -->
  <path d="M23,5 L25,5 L25.5,38 Q25,44 24,44 Q23,44 22.5,38 Z" fill="#10b981"/>
  <!-- Pointed nose (very aerodynamic) -->
  <ellipse cx="24" cy="5.5" rx="1.5" ry="2" fill="#059669"/>
  <!-- Long wings (twin engine) -->
  <path d="M22.5,18 L3,25 L3,28 L22.5,22.5 L25.5,22.5 L45,28 L45,25 L25.5,18 Z" fill="#10b981"/>
  <!-- Twin engine nacelles (distinctive twin-engine look) -->
  <ellipse cx="13" cy="25" rx="4" ry="2" fill="#059669"/>
  <ellipse cx="35" cy="25" rx="4" ry="2" fill="#059669"/>
  <!-- Small props on engines -->
  <ellipse cx="13" cy="23.5" rx="2" ry="1" fill="#047857"/>
  <ellipse cx="35" cy="23.5" rx="2" ry="1" fill="#047857"/>
  <!-- Horizontal tail -->
  <path d="M22.5,39 Q19,41 17,42.5 L17,40.5 Q19.5,39 22.5,38 L25.5,38 Q28.5,39 31,40.5 L31,42.5 Q29,41 25.5,39 Z" fill="#10b981"/>
</svg>
