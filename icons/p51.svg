<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Fuselage: slim (inline Merlin engine) -->
  <path d="M22.5,5 L25.5,5 L26.5,38 Q25.5,44 24,44 Q22.5,44 21.5,38 Z" fill="#60a5fa"/>
  <!-- Pointed nose (inline engine, no radial cowl) -->
  <path d="M22.5,5 Q24,3 25.5,5 Z" fill="#3b82f6"/>
  <!-- Slim spinner -->
  <ellipse cx="24" cy="6" rx="2" ry="2.5" fill="#3b82f6"/>
  <!-- Laminar flow wings (thinner chord, straight leading edge) -->
  <path d="M22,20 L4,27 L4,30 L22,24.5 L26,24.5 L44,30 L44,27 L26,20 Z" fill="#60a5fa"/>
  <!-- Distinctive chin scoop -->
  <ellipse cx="24" cy="14" rx="2" ry="1.2" fill="#2563eb"/>
  <!-- Horizontal tail -->
  <path d="M22,38.5 Q17.5,40.5 15,42 L15,40 Q18,38.5 22,37.5 L26,37.5 Q30,38.5 33,40 L33,42 Q30.5,40.5 26,38.5 Z" fill="#60a5fa"/>
  <!-- Tail fin -->
  <path d="M23,36 L25,36 L25,43 L23,43 Z" fill="#3b82f6"/>
</svg>
