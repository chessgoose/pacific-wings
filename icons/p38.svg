<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Central cockpit nacelle -->
  <path d="M22,8 L26,8 L26.5,30 L21.5,30 Z" fill="#10b981"/>
  <!-- Nose cone -->
  <ellipse cx="24" cy="7" rx="2.5" ry="3" fill="#059669"/>
  <!-- Left engine boom -->
  <path d="M11,20 Q9,21 9,23 L9,42 Q9,44 11,44 L14,44 Q16,44 16,42 L16,23 Q16,21 14,20 Z" fill="#10b981"/>
  <!-- Right engine boom -->
  <path d="M34,20 Q32,21 32,23 L32,42 Q32,44 34,44 L37,44 Q39,44 39,42 L39,23 Q39,21 37,20 Z" fill="#10b981"/>
  <!-- Wings connecting all three (widest WWII fighter) -->
  <path d="M21.5,21 L2,25.5 L2,29 L12,27 L21.5,24.5 L26.5,24.5 L36,27 L46,29 L46,25.5 L26.5,21 Z" fill="#10b981"/>
  <!-- Left engine nacelle (front) -->
  <ellipse cx="12.5" cy="21" rx="4" ry="2.5" fill="#059669"/>
  <!-- Right engine nacelle (front) -->
  <ellipse cx="35.5" cy="21" rx="4" ry="2.5" fill="#059669"/>
  <!-- Twin tails (left boom) -->
  <path d="M9,40 L5,44 L9,44 Z" fill="#059669"/>
  <path d="M16,40 L20,44 L16,44 Z" fill="#059669"/>
  <!-- Twin tails (right boom) -->
  <path d="M32,40 L28,44 L32,44 Z" fill="#059669"/>
  <path d="M39,40 L43,44 L39,44 Z" fill="#059669"/>
</svg>
